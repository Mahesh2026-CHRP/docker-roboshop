version: '3.8'

services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb
    networks:
      - default

  catalogue:
    build: ./catalogue
    image: catalogue:v1
    container_name: catalogue
    networks:
      - default

  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - default

networks:
  default:
    name: roboshop
    driver: bridge